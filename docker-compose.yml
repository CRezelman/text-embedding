services:
  embedding-api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ollama_models:/root/.ollama # Persist models between restarts
    environment:
      - EMBEDDING_MODEL=qwen3-embedding:8b
      - OLLAMA_HOST=http://localhost:11434
    restart: unless-stopped
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia # Remove this block if no GPU
    #           count: all
    #           capabilities: [gpu]

volumes:
  ollama_models:
